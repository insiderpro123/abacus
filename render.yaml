# Render Blueprint - creates the web service + a managed Postgres database.
# In Render: New -> Blueprint -> pick this repo. Then set APP_PASSWORD in the
# web service's Environment tab. (SECRET_KEY is generated; DATABASE_URL is wired
# automatically from the database below.)
databases:
  - name: abacus-db
    plan: free
    region: frankfurt

services:
  - type: web
    name: abacus-tracker
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: abacus-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: APP_PASSWORD
        sync: false          # set this yourself in the Render dashboard
      # Jira (read-only story points). JIRA_API_TOKEN is a secret set by hand.
      - key: JIRA_BASE_URL
        value: "https://insiderpro.atlassian.net"
      - key: JIRA_EMAIL
        value: "team@insiderpro.co.uk"
      - key: JIRA_API_TOKEN
        sync: false          # set this yourself in the Render dashboard (read-only token)
      - key: PYTHON_VERSION
        value: "3.12.6"
